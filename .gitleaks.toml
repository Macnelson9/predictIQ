title = "PredictIQ Gitleaks Configuration"

[extend]
useDefault = true

[[rules]]
id = "stellar-secret-key"
description = "Stellar Secret Key"
regex = '''S[A-Z0-9]{55}'''
tags = ["key", "stellar"]

[[rules]]
id = "stellar-public-key"
description = "Stellar Public Key"
regex = '''G[A-Z0-9]{55}'''
tags = ["key", "stellar"]

[[rules]]
id = "api-key-header"
description = "API Key in code"
regex = '''(?i)(x-api-key|api[_-]?key)\s*[:=]\s*['"][a-zA-Z0-9]{32,}['"]'''
tags = ["key", "api"]

[[rules]]
id = "database-url"
description = "Database connection string"
regex = '''postgres(ql)?://[a-zA-Z0-9_-]+:[a-zA-Z0-9_-]+@[a-zA-Z0-9.-]+:[0-9]+/[a-zA-Z0-9_-]+'''
tags = ["database", "connection"]

[[rules]]
id = "redis-url"
description = "Redis connection string"
regex = '''redis://[a-zA-Z0-9_-]+:[a-zA-Z0-9_-]+@[a-zA-Z0-9.-]+:[0-9]+'''
tags = ["redis", "connection"]

[allowlist]
description = "Allowlist for false positives"
paths = [
  '''^\.env\.example$''',
  '''^.*\.md$''',
  '''^.*test.*\.rs$''',
  '''^.*_test\.ts$''',
]

regexes = [
  '''example\.com''',
  '''localhost''',
  '''127\.0\.0\.1''',
  '''GXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX''',
  '''SXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX''',
]
